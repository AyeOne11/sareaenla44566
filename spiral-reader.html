<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spiral • Free E-Reader • Enla Archives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Playfair Display', serif; background: #f4f0e8; color: #3d2e1f; }
        .reader { max-width: 720px; margin: 0 auto; padding: 60px 40px; line-height: 2.0; font-size: 22px; }
        .chapter { display: none; }
        .chapter.active { display: block; }
        .prose p { margin-bottom: 1.5em; }
        .nav-btn { padding: 12px 24px; background: #2d3748; color: #f7fafc; border-radius: 9999px; font-weight: 700; transition: all 0.3s; }
        .nav-btn:hover { background: #4a5568; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .header { background: #2d3748; color: #f7fafc; }
    </style>
</head>
<body class="min-h-screen">

<header class="header p-4 sticky top-0 z-50 border-b-2 border-[#a0aec0] flex justify-between items-center max-w-[720px] mx-auto">
    <a href="stories.html" class="text-sm hover:text-[#a0aec0] flex items-center gap-1">← Back to Library</a>
    <h1 class="text-xl font-bold">The Spiral • Sarah E. Adams</h1>
    <div class="flex items-center gap-4">
        <button onclick="toggleDark()" class="text-2xl">☀️</button>
        <select id="fontSize" onchange="changeFontSize()" class="bg-transparent text-white">
            <option value="18">Small</option>
            <option value="22" selected>Medium</option>
            <option value="26">Large</option>
        </select>
    </div>
</header>

<div id="reader" class="reader"></div>

<script>
    const chapters = [
        { title: "Preface", content: `<p>The cold mud of the alley was a familiar cruelty, seeping through the tatters of what was once a respectable dress. Lyra pressed her back against the crumbling brick of a forgotten tenement, trying to disappear into the shadows of Bisk's outer slums. A tremor started in her hands, a relentless, gnawing quake that had nothing to do with the chill in the air. It was the hunger. Not for food—though that was a dull ache in her belly—but for the sweet, rainbow-hued vapor that promised to wash all this away. The promise of Daze was a serene escape; the hook of Requiem was the insatiable craving that followed.</p><p>A child’s laughter echoed from a nearby street, sharp and clear. The sound was a blade that sliced through the fog of her withdrawal, dragging her back to a memory so vivid it hurt. Sunlight streaming through a clean window. The scent of fresh bread cooling on the counter. Her son, his small hand tucked into hers, humming a simple hymn they’d learned at the last service for The Church of the Sixx. Her life then was a quiet rhythm of familial duty, a world of order where her role as a woman was to nurture and preserve the family's purity. It was stifling, yes, but it was warm. It was safe. A violent shiver wracked her body, shattering the memory and throwing her back into the filth of the alley. The warmth was gone, replaced by the cold, hard truth. Her husband had cast her out. The Church had condemned her. Her children... she couldn't let herself think of her children. The pain was too great, and there was only one medicine for it.</p><p>The tremor in her hands worsened. She needed a fix. The last of her silver had gone yesterday to a black-market dealer who had laughed at her desperation. She had nothing left to sell. Nothing except the one thing her Alorerian upbringing taught her was a sacred temple, the final currency of the Defiled. Her gaze lifted from the mud, scanning the mouth of the alley. She would have to trade her body for the drug that had destroyed her life. It was the only way to silence the screaming in her soul.</p>` },

        { title: "Chapter 1: The Market", content: `<p>It was an unseasonably warm day in Bisk as Lyra browsed the stalls of the busy market. She cursed herself for wearing such a heavy dress. If she hadn’t been in a hurry to escape her four needy children, she would have gone back upstairs to change into lighter garments. The Royal Market was one of her favourite places. She loved the vibrant energy of the bustling crowd and the large variety of stalls peddling wares from all across the Great Northern Region. There was everything from spiced breads, exotic jams, colourful, patterned fabrics, and trinkets of all varieties.</p><p>Lyra clutched her basket, the rough weave digging into her palm. She began to feel the sweat trickling between her breasts and pooling within the undergarments. Thankfully, only a few things were needed from the farmer’s stand, which had no line. Small blessings, she thought as she pushed her way through to the stall where she quickly grabbed the remaining items, paid the man, and left.</p><p>Despite discomfort from the heat, she found herself lingering, not wanting to begin the walk home. She could already picture the children arguing while her own mother chided her for taking too long. She’d be expected to promptly reprimand the children with the harshest punishment for bickering in front of their grandmother. The whole vision made her weary.</p><p>She closed her eyes, offering a silent prayer of relief to the Divine Sixx, but as usual the prayer felt hollow, swallowed by the noise before it could ascend. There was no divine comfort, only the oppressive sun and the increasingly heavy fabric of her dress.</p><p>As Lyra reluctantly made her way towards the market’s exit, a loud group of men poured out of one of the pubs... Garrick handed her the tainted vial with a grin. “Don’t worry, M’lady, it’s safe as a calm sea. The instructions are simple: take a pinch, place it into a pipe, light and inhale it. Trust me, you’ll thank us later.”</p>` },

        { title: "Chapter 2: The First Taste", content: `<p>Late that night, after the household had finally fallen into restful sleep, Lyra slipped from the bed she shared with her husband. Her bare feet met the cold wooden floor and sent a shiver up her legs... She crept down the narrow stairs into the kitchen cellar...</p><p>She drew the small glass pipe from her skirt pocket... She held the candle flame to the bowl. The white powder caught at once with a sharp, satisfying snap and crackle... A sweet, alien scent rose...</p><p>The effect was instantaneous. A revelation. It swept through her like a warm tidal wave... For the first time in years she felt light, free, and strangely beautiful...</p><p>Beneath the bright euphoria, a different warmth stirred... She pushed the thought away almost at once...</p><p>She wasn’t sure how long she remained there in the cellar... She capped the vial with a soft click... and slipped upstairs to bed before the dawn broke.</p>` },

        { title: "Chapter 3: Garrick (V.1)", content: `<p>“Maybe if you stopped giving away so many free samples we’d be able to afford a decent bed tonight,” Renn scoffed...</p><p>“You’ll be thanking me in a few weeks when we can afford a proper bed and a woman every night,” Garrick shot back...</p><p>Garrick continued explaining the Requiem mix... “She might not look like she’s married to a Duke, but she’s exactly the type that pays off...”</p><p>The men drained the last of their ale... Their business was just getting started.</p>` },

        { title: "Chapter 4: Lyra (V.1)", content: `<p>The next two weeks slipped by quickly for Lyra... She headed down into the cellar...</p><p>She lit the candle... inhaled as deep as she could... Suddenly her nostrils became inflamed... She began to choke...</p><p>Her body trembled violently... A giddy rush consumed her and she began to laugh hysterically... The dinner bell rang. Cold, sharp panic sliced through her...</p>` },

        { title: "Chapter 5", content: `<p>Thin gray smoke curled from the iron pot on the stove. Lyra stood in front of it, wooden spoon hanging limp in her hand...</p><p>“Lyra?” Harlan asked hesitantly. She startled violently... “I’m perfectly fine,” she said quickly. “Just tired.”</p><p>Harlan nodded... he couldn’t help but feel something was terribly wrong.</p>` },

        { title: "Chapter 6: The Price of Success (V.1)", content: `<p>The road from Port Lock stretched long and dusty, but the weight of their heavily laden saddlebags made the journey feel almost pleasant...</p><p>Renn broke the comfortable silence... “It seems to really help them, Garrick...”</p><p>Garrick laughed. “Legal? The moment it’s legal it’s taxed and worthless to us...”</p>` },

        { title: "Chapter 7: The Weight of Silver (V.1)", content: `<p>The day of the sales point arrived under a sky the color of a dull pewter bowl...</p><p>Garrick’s face split into a wide, performative grin... “The price is a few silver more per vial.”</p><p>Lyra paid him... She slipped into the shadowed passage for a quick dose...</p>` },

        { title: "Garrick at Lucy’s Inn", content: `<p>The air in Lucy’s Inn was thick with the scent of roasted mutton... “I told you boys our return to Bisk would be a jackpot!”</p><p>Renn didn’t join the celebration... “We shouldn’t be pretending to be doctors, Garrick...”</p>` },

        { title: "Final Scene (Draft)", content: `<p>Lyra! Her husband’s voice no longer brought her any joy but instead she jumped anytime she heard it...</p><p>“Come here!”</p><p>She found her husband holding one of his shirts. [CONTINUE TO DETAIL CHAPTER]</p>` }
    ];

    let currentChapter = 0;

    function renderChapter() {
        const container = document.getElementById('reader');
        container.innerHTML = `
            <h2 class="text-3xl font-bold mb-8 text-center">${chapters[currentChapter].title}</h2>
            <div class="prose">${chapters[currentChapter].content}</div>
            <div class="flex justify-between mt-12 border-t pt-8">
                <button onclick="prevChapter()" class="nav-btn" ${currentChapter === 0 ? 'disabled' : ''}>← Previous Chapter</button>
                <button onclick="nextChapter()" class="nav-btn" ${currentChapter === chapters.length-1 ? 'disabled' : ''}>Next Chapter →</button>
            </div>
        `;
    }

    function nextChapter() { if (currentChapter < chapters.length - 1) { currentChapter++; renderChapter(); window.scrollTo(0, 0); } }
    function prevChapter() { if (currentChapter > 0) { currentChapter--; renderChapter(); window.scrollTo(0, 0); } }

    function toggleDark() {
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            document.body.style.background = '#f4f0e8';
            document.body.style.color = '#3d2e1f';
        } else {
            document.documentElement.classList.add('dark');
            document.body.style.background = '#1a202c';
            document.body.style.color = '#f7fafc';
        }
    }

    function changeFontSize() {
        const size = document.getElementById('fontSize').value;
        document.querySelector('.reader').style.fontSize = size + 'px';
    }

    window.onload = renderChapter;
</script>
</body>
</html>
